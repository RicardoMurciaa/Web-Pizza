<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Inicio - Pizza</title>
</head>
<body>
    <header>
        <nav>
            <h1>Hola</h1>
        </nav>
    </header>

    <main>
        <section>
            <div class="carrusel">
                <ul>
                    <li><img src="/img/banner1.png" alt="Promocion Pizza 1"></li>
                    <li><img src="/img/banner2.png" alt="Promocion Pizza 2"></li>
                    <li><img src="/img/banner3.png" alt="Promocion Pizza 3"></li>
                    <li><img src="/img/banner4.png" alt="Promocion Pizza 4"></li>
                    <li><img src="/img/banner5.png" alt="Promocion Pizza 5"></li>
                </ul>
            </div>
        </section>

        <section>
            <h1 class="titulo">Menu</h1>
            <div class="contenedorMenu">
                <a href="#" class="individual">
                    <img src="/img/pizzaMenu.jpg">
                    <div class="contenidoIndividual">
                        <h2>Pizzas</h2>
                    </div>
                </a>

                <a href="#" class="individual">
                    <img src="/img/promo.png">
                    <div class="contenidoIndividual">
                        <h2>Promociones</h2>
                    </div>
                </a>

                <a href="#" class="individual">
                    <img src="/img/especial.png">
                    <div class="contenidoIndividual">
                        <h2>Especialidades</h2>
                    </div>
                </a>

                <a href="#" class="individual">
                    <img src="/img/complemento.png">
                    <div class="contenidoIndividual">
                        <h2>Complementos</h2>
                    </div>
                </a>
            </div>
        </section>
    </main>
</body>
</html>
